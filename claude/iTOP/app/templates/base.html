<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}iTop Reporting{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f6fa; }
    .sidebar { min-height: 100vh; background: #1a2235; }
    .sidebar .nav-link { color: #a0aec0; border-radius: 8px; margin: 2px 0; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #2d3a50; color: #fff; }
    .sidebar .brand { color: #fff; font-size: 1.2rem; font-weight: 700; }
    .sidebar .section-label { color: #4a5568; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .stat-card { border-radius: 12px; }
    .table th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .5px; color: #6c757d; }
    .badge-billable { background: #d1fae5; color: #065f46; }
    .badge-not-billable { background: #fee2e2; color: #991b1b; }
    .progress { height: 6px; border-radius: 4px; }
  </style>
</head>
<body>
<div class="d-flex">
  <!-- Sidebar -->
  <div class="sidebar p-3" style="width:240px; flex-shrink:0;">
    <div class="brand mb-4 px-2">
      <i class="bi bi-layers-half me-2"></i>iTop Portal
    </div>
    <div class="section-label px-2 mb-1">Reporting</div>
    <nav class="nav flex-column mb-3">
      <a class="nav-link {% if request.url.path == '/reporting/internal' %}active{% endif %}"
         href="/reporting/internal">
        <i class="bi bi-bar-chart me-2"></i>Interní reporting
      </a>
      <a class="nav-link {% if '/reporting/external' in request.url.path %}active{% endif %}"
         href="/reporting/external/">
        <i class="bi bi-file-earmark-text me-2"></i>Externí reporting
      </a>
      <a class="nav-link {% if '/reporting/jira' in request.url.path %}active{% endif %}"
         href="/reporting/jira/">
        <i class="bi bi-journal-code me-2"></i>JIRA Reporting
      </a>
    </nav>
    <div class="section-label px-2 mb-1">Tickety</div>
    <nav class="nav flex-column mb-3">
      <a class="nav-link {% if '/tickets' in request.url.path %}active{% endif %}"
         href="/tickets/"><i class="bi bi-ticket me-2"></i>Přehled ticketů</a>
    </nav>
    <div class="section-label px-2 mb-1">Import</div>
    <nav class="nav flex-column">
      <a class="nav-link {% if '/import/agrofert' in request.url.path %}active{% endif %}"
         href="/import/agrofert/"><i class="bi bi-upload me-2"></i>AGF Helpdesk</a>
    </nav>
  </div>

  <!-- Main content -->
  <div class="flex-grow-1 p-4">
    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
