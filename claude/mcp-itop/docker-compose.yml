services:
  mcp-itop:
    build: .
    env_file: .env
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=8000
    networks:
      - traefik_proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp-itop.rule=Host(`mcp-itop.localhost`)"
      - "traefik.http.routers.mcp-itop.entrypoints=web"
      - "traefik.http.services.mcp-itop.loadbalancer.server.port=8000"

networks:
  traefik_proxy:
    external: true
